name: __MSG_name__
description: __MSG_description__
version: __VERSION__
default_locale: en
author: Asger Finding
manifest_version: 2
homepage_url: "https://github.com/asger-finding/tanktroubleaddons"
icons:
  32: meta/32.png
  64: meta/64.png
  96: meta/96.png
  128: meta/128.png
browser_action:
  default_title: __MSG_name__
content_scripts:
  - run_at: document_start
    js: [scripts/index.js]
    matches: ["*://*.tanktrouble.com/*"]

  - run_at: document_start
    css: [css/styles.css]
    matches: ["*://*.tanktrouble.com/*"]
background:
  scripts:
    - config/rules.js
    - scripts/service.js
permissions:
  - tabs
  - "*://*.tanktrouble.com/*"
  - "*://code.jquery.com/*"
  - "*://ironvault.vercel.app/api/*"
  - webRequest
  - webRequestBlocking
  - storage
web_accessible_resources:
  - "*"
